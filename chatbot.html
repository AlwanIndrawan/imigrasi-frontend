<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Asisten Virtual Imigrasi</title>

<style>

/* =========================
   GLOBAL
========================= */
body{
margin:0;
font-family:Arial;
background:linear-gradient(rgba(11,61,145,0.7), rgba(11,61,145,0.7)), url('bg.jpeg');
background-size:cover;
background-position:center;
color:white;

display:flex;
flex-direction:column;
align-items:center;

height:100vh;
overflow:hidden;
}

/* =========================
   HEADER
========================= */
header{
width:100%;
max-width:1200px;
text-align:center;
padding:20px;
font-size:24px;
font-weight:bold;
background:rgba(0,0,0,0.3);
backdrop-filter: blur(5px);
border-radius:0 0 20px 20px;
}

/* =========================
   CONTAINER
========================= */
#container{
width:100%;
max-width:1200px;
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
box-sizing:border-box;
}

/* =========================
   CHAT BOX
========================= */
#chatBox{
width:100%;
max-width:800px;
height:clamp(500px, 80vh, 900px);

display:flex;
flex-direction:column;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:20px;
overflow:hidden;
z-index:5;
}

/* =========================
   CHAT HEADER
========================= */
#chatHeader{
padding:15px;
font-weight:bold;
background:rgba(0,0,0,0.3);
border-bottom:1px solid rgba(255,255,255,0.2);
}

/* =========================
   CHAT
========================= */
#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
}

/* =========================
   CHAT BUBBLE
========================= */
.message{
display:inline-block;
max-width:70%;
padding:14px 18px;
margin-bottom:12px;
border-radius:18px;
font-size:15px;
line-height:1.4;
white-space:pre-wrap;
}

.user{
background:#131e7e;
color:white;
margin-left:auto;
width:fit-content;
border-bottom-right-radius:5px;
}

.bot{
background:#f1f5f9;
color:black;
margin-right:auto;
width:fit-content;
border-bottom-left-radius:5px;
}

/* =========================
   INPUT
========================= */
#inputArea{
display:flex;
align-items:center;
padding:15px;
background:rgba(255,255,255,0.2);
}

#userInput{
flex:1;
padding:12px;
border:none;
border-radius:10px;
outline:none;
}

button{
margin-left:10px;
padding:10px 18px;
border:none;
border-radius:10px;
background:#1e3a8a;
color:white;
cursor:pointer;
}

/* =========================
   CHARACTER BESAR (AMAN)
========================= */
#charLeft, #charRight{
position:fixed;
bottom:0;
z-index:1;
pointer-events:none;
}

/* posisi agak keluar biar tidak nutup chat */
#charLeft{
left:-40px;
}

#charRight{
right:-40px;
}

/* ukuran BESAR tapi aman */
#charLeft img,
#charRight img{
width:clamp(180px, 22vw, 320px);
opacity:0.95;
}

/* animasi halus */
@keyframes float {
0% { transform: translateY(0px); }
50% { transform: translateY(-10px); }
100% { transform: translateY(0px); }
}

#charLeft img,
#charRight img{
animation: float 3s ease-in-out infinite;
}

/* saat ngomong */
.talking{
transform:scale(1.05);
}

/* =========================
   BACK BUTTON
========================= */
#back{
position:fixed;
top:80px;
left:20px;
padding:10px 16px;
border-radius:30px;
background:rgba(255,255,255,0.15);
cursor:pointer;
z-index:11;
}

/* =========================
   RESPONSIVE MOBILE
========================= */
@media (max-width:768px){

#charLeft{
left:-60px;
}

#charRight{
right:-60px;
}

#charLeft img,
#charRight img{
width:clamp(120px, 30vw, 180px);
opacity:0.7; /* biar tidak ganggu */
}

}

</style>
</head>

<body>

<header>
ASISTEN VIRTUAL IMIGRASI SULAWESI SELATAN
</header>

<div id="back" onclick="location.href='index.html'">
Kembali
</div>

<!-- KARAKTER -->
<div id="charLeft">
  <img id="menChar" src="idle-men.png">
</div>

<div id="charRight">
  <img id="womenChar" src="idle-women.png">
</div>

<div id="container">

<div id="chatBox">

<div id="chatHeader">
Asisten Virtual Siap Membantu
</div>

<div id="chat"></div>

<div id="inputArea">
<input id="userInput" placeholder="Tanyakan tentang keimigrasian...">
<button onclick="sendMessage()">Kirim</button>
</div>

</div>

</div>

<script>

/* =========================
   KARAKTER CONTROL
========================= */
function setCharacter(state){

let men = document.getElementById("menChar");
let women = document.getElementById("womenChar");

if(state === "talk"){
  men.src = "talk-men.png";
  women.src = "talk-women.png";

  men.classList.add("talking");
  women.classList.add("talking");

}else{
  men.src = "idle-men.png";
  women.src = "idle-women.png";

  men.classList.remove("talking");
  women.classList.remove("talking");
}

}

/* =========================
   CHAT UI
========================= */
function addMessage(text,type){
let chat=document.getElementById("chat");

let div=document.createElement("div");
div.className="message "+type;
div.innerText=text;

chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;

return div;
}

function sendMessage(){
let input=document.getElementById("userInput");
let message=input.value;
if(message==="") return;

addMessage(message,"user");
input.value="";

botReply(message);
}

document.getElementById("userInput").addEventListener("keydown", function(e) {
if (e.key === "Enter") {
e.preventDefault();
sendMessage();
}
});

/* =========================
   BOT
========================= */
async function botReply(text){

let bubble=addMessage("...", "bot");

setCharacter("talk");

try{

let response=await fetch("https://imigrasi-ai.onrender.com/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});

let data=await response.json();

bubble.innerText=data.reply;

setCharacter("idle");

}catch{

bubble.innerText="Terjadi kesalahan koneksi.";
setCharacter("idle");

}

}

</script>

</body>
</html>
