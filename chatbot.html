<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Asisten Virtual Imigrasi</title>

<style>

/* =========================
   GLOBAL (LOCK SCROLL)
========================= */
body{
margin:0;
font-family:Arial;
background:linear-gradient(rgba(11,61,145,0.7), rgba(11,61,145,0.7)), url('bg.jpeg');
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;

display:flex;
flex-direction:column;
align-items:center;

/* 🔒 KUNCI HALAMAN */
height:100vh;
overflow:hidden;
}

/* =========================
   HEADER
========================= */
header{
width:100%;
max-width:1200px;
text-align:center;
padding:20px;
font-size:24px;
font-weight:bold;
background:rgba(0,0,0,0.3);
backdrop-filter: blur(5px);
border-radius:0 0 20px 20px;
}

/* =========================
   LAYOUT
========================= */
#container{
width:100%;
max-width:1200px;
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
box-sizing:border-box;

/* PENTING */
overflow:hidden;
}

#chatArea{
width:100%;
display:flex;
justify-content:center;
align-items:center;
}

/* =========================
   CHAT BOX
========================= */
#chatBox{
position:relative;
width:100%;
max-width:800px;
height:clamp(500px, 80vh, 900px);

display:flex;
flex-direction:column;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:20px;
overflow:hidden;
}

/* =========================
   AI CHARACTER
========================= */
#aiCharacter{
position:absolute;
bottom:80px;
right:15px;
z-index:5;
pointer-events:none;
}

#aiImg{
width:clamp(80px, 10vw, 130px);
transition:0.2s;
}

/* =========================
   CHAT HEADER
========================= */
#chatHeader{
padding:15px;
font-weight:bold;
background:rgba(0,0,0,0.3);
border-bottom:1px solid rgba(255,255,255,0.2);
}

/* =========================
   CHAT (BISA SCROLL)
========================= */
#chat{
flex:1;
overflow-y:auto; /* ✅ SCROLL DI SINI */
padding:20px;
display:flex;
flex-direction:column;

scroll-behavior:smooth;
}

/* SCROLLBAR */
#chat::-webkit-scrollbar{
width:6px;
}
#chat::-webkit-scrollbar-thumb{
background:rgba(255,255,255,0.3);
border-radius:10px;
}

/* =========================
   CHAT BUBBLE
========================= */
.message{
display:inline-block;
max-width:70%;
padding:14px 18px;
margin-bottom:12px;
border-radius:18px;
font-size:15px;
line-height:1.4;
animation: fadeIn 0.3s ease;
word-wrap:break-word;
white-space:pre-wrap;
}

.user{
background:#131e7e;
color:white;
margin-left:auto;
display:block;
width:fit-content;
border-bottom-right-radius:5px;
}

.bot{
background:#f1f5f9;
color:black;
margin-right:auto;
display:block;
width:fit-content;
border-bottom-left-radius:5px;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* =========================
   INPUT
========================= */
#inputArea{
display:flex;
align-items:center;
padding:15px;
background:rgba(255,255,255,0.2);
}

#userInput{
flex:1;
padding:12px;
border:none;
border-radius:10px;
outline:none;
font-size:14px;
}

button{
margin-left:10px;
padding:10px 18px;
border:none;
border-radius:10px;
background:#1e3a8a;
color:white;
cursor:pointer;
}

button:hover{
opacity:0.85;
}

/* MIC */
#micBtn.active{
background:#1e3a8a;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{ transform:scale(1); }
50%{ transform:scale(1.15); }
100%{ transform:scale(1); }
}

#micStatus{
margin-left:10px;
font-size:13px;
}

/* =========================
   BACK BUTTON
========================= */
#back{
position:fixed;
top:80px;
left:20px;
padding:10px 16px;
border-radius:30px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
cursor:pointer;
z-index:11;
}

/* =========================
   RESPONSIVE
========================= */
@media (min-width:1600px){
#chatBox{
max-width:900px;
}
}

@media (max-width:600px){

#chatBox{
height:90vh;
border-radius:0;
}

#aiCharacter{
right:10px;
bottom:70px;
}

}

</style>
</head>

<body>

<header>
ASISTEN VIRTUAL IMIGRASI SULAWESI SELATAN
</header>

<div id="back" onclick="location.href='index.html'">
Kembali
</div>

<div id="container">
<div id="chatArea">
<div id="chatBox">

<div id="chatHeader">
Asisten Virtual Siap Membantu
</div>

<!-- AI CHARACTER -->
<div id="aiCharacter">
  <img id="aiImg" src="idle.png">
</div>

<div id="chat"></div>

<div id="inputArea">
<input id="userInput" placeholder="Tanyakan tentang keimigrasian...">
<button id="micBtn" onclick="startListening()">🎙️</button>
<button onclick="sendMessage()">Kirim</button>
<span id="micStatus"></span>
</div>

</div>
</div>
</div>

<script>

/* =========================
   AI STATE
========================= */
function setAI(state){
  let img = document.getElementById("aiImg");
  img.src = state === "talk" ? "talk.png" : "idle.png";
}

/* =========================
   SPEAK
========================= */
async function speak(text){

setAI("talk");

try{
  let res = await fetch("https://imigrasi-ai.onrender.com/tts-eleven",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ text: text })
  });

  if(!res.ok) throw new Error();

  let blob = await res.blob();
  let audio = new Audio(URL.createObjectURL(blob));

  await audio.play();
  audio.onended = () => setAI("idle");

}catch{

  let suara = new SpeechSynthesisUtterance(text);
  suara.lang = "id-ID";
  suara.onend = () => setAI("idle");

  speechSynthesis.cancel();
  speechSynthesis.speak(suara);
}

}

/* =========================
   CHAT
========================= */
function addMessage(text,type){
let chat=document.getElementById("chat");

let div=document.createElement("div");
div.className="message "+type;
div.innerText=text;

chat.appendChild(div);

/* AUTO SCROLL */
chat.scrollTop = chat.scrollHeight;

return div;
}

function sendMessage(){
let input=document.getElementById("userInput");
let message=input.value;
if(message==="") return;

addMessage(message,"user");
input.value="";
botReply(message);
}

document.getElementById("userInput").addEventListener("keydown", function(e) {
if (e.key === "Enter") {
e.preventDefault();
sendMessage();
}
});

/* =========================
   VOICE INPUT
========================= */
let recognition;
let isListening = false;

function startListening(){

if (!('webkitSpeechRecognition' in window)) {
alert("Browser tidak mendukung voice input");
return;
}

let micBtn = document.getElementById("micBtn");
let status = document.getElementById("micStatus");

if(isListening){
recognition.stop();
return;
}

recognition = new webkitSpeechRecognition();
recognition.lang = "id-ID";

isListening = true;
micBtn.classList.add("active");
status.innerText = "🎤 Mendengarkan...";

recognition.start();

recognition.onresult = function(event){
let hasil = event.results[0][0].transcript;
document.getElementById("userInput").value = hasil;
sendMessage();
};

recognition.onend = function(){
isListening = false;
micBtn.classList.remove("active");
status.innerText = "";
};

}

/* =========================
   BOT
========================= */
async function botReply(text){

let bubble=addMessage("...", "bot");
setAI("talk");

try{

let response=await fetch("https://imigrasi-ai.onrender.com/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});

let data=await response.json();

bubble.innerText=data.reply;

await speak(data.reply);

}catch{

bubble.innerText="Terjadi kesalahan koneksi.";
setAI("idle");

}

}

</script>

</body>
</html>
