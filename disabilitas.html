<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pusat Informasi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
body{
margin:0;
font-family:'Inter', sans-serif;
color:white;
height:100vh;
overflow:hidden;

background:
linear-gradient(rgba(7,31,79,0.9), rgba(11,61,145,0.95)),
url('bg.jpeg');
background-size:cover;
}

/* HEADER */
#header{
position:fixed;
top:0;
width:100%;
padding:15px;
text-align:center;
font-family:'Poppins';
font-weight:600;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(12px);
z-index:10;
}

/* BACK BUTTON */
#back{
position:fixed;
top:100px; /* FIX tidak nutup video */
left:40px;
padding:10px 18px;
border-radius:30px;
background:rgba(255,255,255,0.15);
cursor:pointer;
z-index:20;
transition:0.3s;
}
#back:hover{
background:rgba(255,255,255,0.3);
}

/* CONTAINER */
#container{
display:flex;
height:calc(100vh - 80px); /* FULL tanpa kosong */
padding:90px 30px 20px;
gap:25px;
}

/* LEFT */
#left{
flex:1.7;
display:flex;
align-items:flex-start;
height:100%;
}

#videoBox{
width:100%;
height:100%;
max-height:calc(100vh - 140px);
border-radius:24px;
overflow:hidden;
position:relative;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

/* PLAYER */
#mainVideo{
width:100%;
height:100%;
}

/* OVERLAY */
#videoOverlay{
position:absolute;
top:0;
width:100%;
padding:20px;
background:linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
}

#videoTitle{
font-family:'Poppins';
font-size:18px;
}

/* RIGHT */
#right{
flex:1.2;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;

height:100%;
max-height:calc(100vh - 140px);
overflow-y:auto;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:20px;
}

/* CARD */
.card{
display:flex;
gap:15px;
align-items:center;
cursor:pointer;
padding:12px;
border-radius:14px;
transition:0.3s;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
}

.card:hover{
background:rgba(255,255,255,0.15);
transform:translateX(6px);
}

.card.active{
background:rgba(255,255,255,0.25);
box-shadow:0 0 15px rgba(255,255,255,0.3);
}

/* THUMB */
.thumb{
width:110px;
height:70px;
border-radius:10px;
background-size:cover;
background-position:center;
position:relative;
}

.thumb::after{
content:'▶';
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.6);
padding:6px 10px;
border-radius:50%;
}

/* TEXT */
.info{
display:flex;
flex-direction:column;
}

.title{
font-size:14px;
font-weight:600;
}

.desc{
font-size:12px;
opacity:0.7;
}

/* SCROLL */
#right::-webkit-scrollbar{
width:6px;
}
#right::-webkit-scrollbar-thumb{
background:rgba(255,255,255,0.3);
border-radius:10px;
}

</style>
</head>

<body>

<div id="header">PUSAT INFORMASI</div>

<div id="container">

<!-- VIDEO -->
<div id="left">
<div id="videoBox">

<div id="mainVideo"></div>

<div id="videoOverlay">
<div id="videoTitle">Selamat Datang</div>
</div>

</div>
</div>

<!-- LIST -->
<div id="right"></div>

</div>

<!-- YOUTUBE API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>

const videos = [
{ id:"HWwyL9PlnXU", title:"Selamat Datang", desc:"Video pembuka" },
{ id:"z2JAVhx6tE8", title:"Tata Usaha", desc:"Administrasi" },
{ id:"SZf24XHDIbI", title:"Dokumen Perjalanan", desc:"Layanan paspor" },
{ id:"crE6hjTb9A8", title:"Pengawasan", desc:"Pengawasan WNA" },
{ id:"CJKAgLFXJvA", title:"Intelijen", desc:"Keamanan internal" },
{ id:"JjYwEbTkc_I", title:"Biaya Paspor", desc:"Informasi biaya" },
{ id:"GJBrbVdZNdM", title:"Persyaratan", desc:"Dokumen wajib" },
{ id:"DBdg0bxPRDw", title:"Tarif", desc:"Izin tinggal" }
];

let player;
let current = 0;

// INIT PLAYER
function onYouTubeIframeAPIReady(){
player = new YT.Player('mainVideo', {
height: '100%',
width: '100%',
videoId: videos[0].id,
playerVars: {
autoplay: 1,
mute: 1
}
});
}

// RENDER CARD
const container = document.getElementById("right");

videos.forEach((v,i)=>{
let div = document.createElement("div");
div.className = "card";
if(i===0) div.classList.add("active");

div.onclick = ()=>playVideo(i);

div.innerHTML = `
<div class="thumb" style="background-image:url('https://img.youtube.com/vi/${v.id}/hqdefault.jpg')"></div>
<div class="info">
<div class="title">${v.title}</div>
<div class="desc">${v.desc}</div>
</div>
`;

container.appendChild(div);
});

// PLAY VIDEO
function playVideo(index){

current = index;

player.loadVideoById(videos[index].id);

document.getElementById("videoTitle").innerText = videos[index].title;

document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
container.children[index].classList.add("active");

// auto scroll
container.children[index].scrollIntoView({
behavior:"smooth",
block:"center"
});

}

</script>

</body>
</html>
