<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pusat Informasi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL
========================= */
body{
margin:0;
font-family:'Inter', sans-serif;
color:white;
height:100vh;
overflow:hidden;

background:
linear-gradient(rgba(7,31,79,0.85), rgba(11,61,145,0.9)),
url('bg.jpeg');

background-size:cover;
background-position:center;
}

/* =========================
   HEADER
========================= */
#header{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 0;
text-align:center;
font-family:'Poppins', sans-serif;
font-size:20px;
font-weight:600;
letter-spacing:1px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.2);
box-shadow:0 5px 20px rgba(0,0,0,0.4);
z-index:10;
}

/* =========================
   CONTAINER
========================= */
#container{
display:flex;
width:100%;
height:100%;
padding:40px 30px;
gap:30px;
box-sizing:border-box;
margin-top:70px;
}

/* =========================
   LEFT
========================= */
#left{
flex:2;
display:flex;
align-items:center;
}

#videoBox{
width:100%;
height:85%;
border-radius:20px;
overflow:hidden;
position:relative;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

#mainVideo{
width:100%;
height:100%;
border:none;
}

/* overlay */
#videoOverlay{
position:absolute;
top:0;
left:0;
width:100%;
padding:20px;
background:linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
}

#videoTitle{
font-family:'Poppins', sans-serif;
font-size:20px;
font-weight:600;
text-shadow:0 2px 10px rgba(0,0,0,0.8);
}

/* =========================
   RIGHT
========================= */
#right{
flex:1;
padding:20px;
display:flex;
flex-direction:column;
gap:20px;
overflow-y:auto;
max-height:85%;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:20px;
border:1px solid rgba(255,255,255,0.15);
margin:auto 0;
}

/* scroll */
#right::-webkit-scrollbar{
width:6px;
}
#right::-webkit-scrollbar-thumb{
background:rgba(255,255,255,0.3);
border-radius:10px;
}

/* card */
.card{
display:flex;
gap:15px;
cursor:pointer;
transition:0.3s;
align-items:center;
padding:10px;
border-radius:12px;
}

.card:hover{
background:rgba(255,255,255,0.15);
transform:translateX(5px);
}

.card.active{
background:rgba(255,255,255,0.25);
}

/* thumbnail */
.thumb{
width:100px;
height:70px;
border-radius:8px;
background:linear-gradient(135deg,#1e3a8a,#3b82f6);
}

/* text */
.card p{
margin:0;
font-weight:500;
}

/* =========================
   BACK BUTTON
========================= */
#back{
position:fixed;
top:80px;
left:20px;
padding:10px 16px;
border-radius:30px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
z-index:11;
}

</style>
</head>

<body>

<div id="header">PUSAT INFORMASI</div>

<div id="back" onclick="location.href='index.html'">
Kembali
</div>

<div id="container">

<!-- LEFT -->
<div id="left">
<div id="videoBox">

<iframe 
id="mainVideo"
src="https://drive.google.com/file/d/1y41jwNfuHjDsNRz0q1yWTRNk1mfQBwV6/preview"
allow="autoplay">
</iframe>

<div id="videoOverlay">
<div id="videoTitle">Selamat Datang</div>
</div>

</div>
</div>

<!-- RIGHT -->
<div id="right">

<div class="card active" onclick="playVideo(this,'1y41jwNfuHjDsNRz0q1yWTRNk1mfQBwV6','Selamat Datang')">
<div class="thumb"></div>
<p>Selamat Datang</p>
</div>

<div class="card" onclick="playVideo(this,'1ITORdE8kr1piramfByikyB5inMjir0lq','Bagian Tata Usaha dan Umum')">
<div class="thumb"></div>
<p>Bagian Tata Usaha dan Umum</p>
</div>

<div class="card" onclick="playVideo(this,'1ITORdE8kr1piramfByikyB5inMjir0lq','Bidang Dokumen Perjalanan')">
<div class="thumb"></div>
<p>Bidang Dokumen Perjalanan</p>
</div>

<div class="card" onclick="playVideo(this,'1VK7wOXfPUGNyuR_9qkxWYH_gxLrK4t0E','Bidang Pengawasan')">
<div class="thumb"></div>
<p>Bidang Pengawasan</p>
</div>

<div class="card" onclick="playVideo(this,'1JBePB_y82C2rrbwp1dNkuDyx3hx79W8i','Bidang Intelijen')">
<div class="thumb"></div>
<p>Bidang Intelijen</p>
</div>

<div class="card" onclick="playVideo(this,'1HUQf_gb-Fw-KRkI-lAQ_BeNysTdIZdG6','Biaya Paspor')">
<div class="thumb"></div>
<p>Biaya Paspor</p>
</div>

<div class="card" onclick="playVideo(this,'1DzA2kHeDqTUImdiEoNOPR-Qj50kLRmd5','Tarif Layanan')">
<div class="thumb"></div>
<p>Tarif Layanan</p>
</div>

<div class="card" onclick="playVideo(this,'1XYAMpuEM76Ypp8WQqDeVZoI71NIsIoxO','Dokumen Persyaratan')">
<div class="thumb"></div>
<p>Dokumen Persyaratan</p>
</div>

</div>

</div>

<script>

function playVideo(el, id, title){

let video = document.getElementById("mainVideo");
let titleBox = document.getElementById("videoTitle");

video.src = `https://drive.google.com/file/d/${id}/preview`;

titleBox.innerText = title;

document.querySelectorAll(".card").forEach(card=>{
card.classList.remove("active");
});

el.classList.add("active");

}

</script>

</body>
</html>
