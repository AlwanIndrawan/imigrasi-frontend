<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pusat Informasi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL
========================= */
body{
margin:0;
font-family:'Inter', sans-serif;
color:white;

background:
linear-gradient(rgba(7,31,79,0.9), rgba(11,61,145,0.95)),
url('bg.jpeg');
background-size:cover;
background-position:center;

display:flex;
flex-direction:column;
align-items:center;

min-height:100vh;
}

/* =========================
   HEADER
========================= */
#header{
width:100%;
max-width:1300px;
padding:15px;
text-align:center;
font-family:'Poppins';
font-weight:600;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(12px);
border-radius:0 0 20px 20px;
}

/* =========================
   BACK BUTTON (AMAN)
========================= */
#back{
position:fixed;
top:90px;
left:20px;

padding:10px 18px;
border-radius:30px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);

cursor:pointer;
z-index:50;

transition:0.3s;
}

#back:hover{
background:rgba(255,255,255,0.3);
transform:translateY(-2px);
}

/* =========================
   CONTAINER
========================= */
#container{
width:100%;
max-width:1300px;

display:flex;
gap:25px;

padding:20px;
box-sizing:border-box;

flex:1;
}

/* =========================
   LEFT (VIDEO)
========================= */
#left{
flex:1.6;
display:flex;
}

#videoBox{
width:100%;
height:clamp(400px, 65vh, 750px);

border-radius:24px;
overflow:hidden;
position:relative;

box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

/* PLAYER */
#mainVideo{
width:100%;
height:100%;
}

/* OVERLAY */
#videoOverlay{
position:absolute;
top:0;
width:100%;
padding:20px;
background:linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
}

#videoTitle{
font-family:'Poppins';
font-size:18px;
}

/* =========================
   RIGHT (LIST)
========================= */
#right{
flex:1.1;
padding:20px;

display:flex;
flex-direction:column;
gap:12px;

height:clamp(400px, 65vh, 750px);
overflow-y:auto;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:20px;
}

/* CARD */
.card{
display:flex;
gap:15px;
align-items:center;
cursor:pointer;
padding:12px;
border-radius:14px;

transition:0.3s;

background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
}

.card:hover{
background:rgba(255,255,255,0.15);
transform:translateX(6px);
}

.card.active{
background:rgba(255,255,255,0.25);
box-shadow:0 0 15px rgba(255,255,255,0.3);
}

/* THUMB */
.thumb{
width:110px;
height:70px;
border-radius:10px;
background-size:cover;
background-position:center;
position:relative;
flex-shrink:0;
}

.thumb::after{
content:'▶';
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.6);
padding:6px 10px;
border-radius:50%;
}

/* TEXT */
.info{
display:flex;
flex-direction:column;
}

.title{
font-size:14px;
font-weight:600;
}

.desc{
font-size:12px;
opacity:0.7;
}

/* SCROLL */
#right::-webkit-scrollbar{
width:6px;
}
#right::-webkit-scrollbar-thumb{
background:rgba(255,255,255,0.3);
border-radius:10px;
}

/* =========================
   LARGE SCREEN FIX
========================= */
@media (min-width:1600px){
#container{
max-width:1400px;
}
}

/* =========================
   TABLET
========================= */
@media (max-width:900px){

#container{
flex-direction:column;
}

#videoBox{
height:300px;
}

#right{
height:300px;
}

}

/* =========================
   MOBILE
========================= */
@media (max-width:600px){

#container{
padding:10px;
gap:15px;
}

#videoBox{
height:220px;
border-radius:15px;
}

#right{
height:250px;
padding:10px;
}

.thumb{
width:90px;
height:60px;
}

#back{
top:70px;
left:10px;
}

}

</style>
</head>

<body>

<div id="header">PUSAT INFORMASI</div>

<!-- BACK BUTTON -->
<div id="back" onclick="location.href='index.html'">
Kembali
</div>

<div id="container">

<!-- VIDEO -->
<div id="left">
<div id="videoBox">

<div id="mainVideo"></div>

<div id="videoOverlay">
<div id="videoTitle">Selamat Datang</div>
</div>

</div>
</div>

<!-- LIST -->
<div id="right"></div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

const videos = [
{ id:"HWwyL9PlnXU", title:"Selamat Datang", desc:"Video pembuka" },
{ id:"z2JAVhx6tE8", title:"Tata Usaha", desc:"Administrasi" },
{ id:"SZf24XHDIbI", title:"Dokumen Perjalanan", desc:"Layanan paspor" },
{ id:"crE6hjTb9A8", title:"Pengawasan", desc:"Pengawasan WNA" },
{ id:"CJKAgLFXJvA", title:"Intelijen", desc:"Keamanan internal" },
{ id:"JjYwEbTkc_I", title:"Biaya Paspor", desc:"Informasi biaya" },
{ id:"GJBrbVdZNdM", title:"Persyaratan", desc:"Dokumen wajib" },
{ id:"DBdg0bxPRDw", title:"Tarif", desc:"Izin tinggal" }
];

let player;
let current = 0;

function onYouTubeIframeAPIReady(){
player = new YT.Player('mainVideo', {
height: '100%',
width: '100%',
videoId: videos[0].id,
playerVars: { autoplay: 1, mute: 1 }
});
}

const container = document.getElementById("right");

videos.forEach((v,i)=>{
let div = document.createElement("div");
div.className = "card";
if(i===0) div.classList.add("active");

div.onclick = ()=>playVideo(i);

div.innerHTML = `
<div class="thumb" style="background-image:url('https://img.youtube.com/vi/${v.id}/hqdefault.jpg')"></div>
<div class="info">
<div class="title">${v.title}</div>
<div class="desc">${v.desc}</div>
</div>
`;

container.appendChild(div);
});

function playVideo(index){

current = index;

player.loadVideoById(videos[index].id);

document.getElementById("videoTitle").innerText = videos[index].title;

document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
container.children[index].classList.add("active");

container.children[index].scrollIntoView({
behavior:"smooth",
block:"center"
});

}

</script>

</body>
</html>
